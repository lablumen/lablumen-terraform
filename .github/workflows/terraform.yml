name: terraform

# Pipeline: scan (Checkov) → plan → manual approval → apply.
# PRs run scan + plan only. Pushes to main run scan + plan, then apply behind the
# `production` GitHub Environment (required-reviewer approval = the manual gate).
on:
  pull_request:
    paths: ["**/*.tf", "**/*.tfvars", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["**/*.tf", "**/*.tfvars", ".github/workflows/terraform.yml"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # OIDC federation to AWS (no static keys)
  pull-requests: write     # post the plan summary on PRs
  security-events: write   # upload Checkov SARIF to GitHub code scanning

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.15.5"   # >=1.10 required for the S3 backend `use_lockfile` (native state locking)
  # domain_name is committed in terraform.tfvars (public, non-secret) — no env override needed.

jobs:
  # ---- 1. SCAN -------------------------------------------------------------------
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@master   # org is bridgecrewIO (not bridgecrew)
        with:
          directory: .
          framework: terraform
          quiet: true
          # Report-only: findings are uploaded to GitHub code scanning (Security tab) but don't block
          # the pipeline. Flip to false (optionally with skip_check) to hard-gate once findings are triaged.
          soft_fail: true
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  # ---- 2. PLAN -------------------------------------------------------------------
  plan:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (tf-plan, read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/lablumen-tf-plan
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - run: terraform fmt -check -recursive
      - run: terraform init -input=false
      - run: terraform validate
      - name: Terraform plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Generate Terraform Plan JSON
        run: terraform show -json tfplan > tfplan.json

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost Cost Estimate
        run: |
          infracost breakdown --path tfplan.json \
                              --format json \
                              --out-file /tmp/infracost.json

      - name: Post Infracost Comment
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github --path /tmp/infracost.json \
                                   --github-token ${{ secrets.GITHUB_TOKEN }} \
                                   --pull-request ${{ github.event.pull_request.number }} \
                                   --behavior update

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 5

  # ---- 3. APPLY (manual approval via the `production` environment) ----------------
  apply:
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production   # configure required reviewers here = the approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (tf-apply, admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/lablumen-tf-apply
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform apply
        run: terraform apply -input=false -no-color tfplan
