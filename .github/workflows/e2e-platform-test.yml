name: E2E Platform Test

# Manual trigger only — each run provisions real AWS infrastructure.
# Set secrets before triggering: SES_SENDER_EMAIL, LABLUMEN_APP_REPO, LABLUMEN_K8S_REPO.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "130290476321"
  EKS_CLUSTER: lablumen-eks

jobs:
  deploy-and-verify:
    name: Full Platform E2E
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      # Side-by-side layout so ../lablumen-app/serverless/ai-service resolves:
      #   $GITHUB_WORKSPACE/lablumen-terraform/   ← Terraform runs here
      #   $GITHUB_WORKSPACE/lablumen-app/         ← Lambda source resolved here
      #   $GITHUB_WORKSPACE/lablumen-k8s/         ← root-app.yaml applied from here
      - name: Checkout Terraform repo
        uses: actions/checkout@v4
        with:
          path: lablumen-terraform

      - name: Checkout App repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.LABLUMEN_APP_REPO }}
          path: lablumen-app

      - name: Checkout K8s repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.LABLUMEN_K8S_REPO }}
          path: lablumen-k8s

      # ── AWS Auth ──────────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/lablumen-gh-actions
          aws-region: ${{ env.AWS_REGION }}

      # ── Phase 1a: Pre-flight — inject runtime config ──────────────────────────
      - name: Inject runtime test configuration into tfvars
        working-directory: lablumen-terraform
        run: |
          # Generate a unique suffix so the S3 bucket name doesn't collide across runs
          BUCKET_SUFFIX=$(date +%s%N | sha256sum | head -c 8)
          cat >> terraform.tfvars <<EOF

          reports_bucket_name = "lablumen-reports-ci-${BUCKET_SUFFIX}"
          ses_sender_email    = "${{ secrets.SES_SENDER_EMAIL }}"
          EOF
          echo "Bucket suffix: ${BUCKET_SUFFIX}"

      # ── Phase 1b: Terraform two-stage bootstrap ───────────────────────────────
      - name: Setup Terraform
        id: setup_terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: lablumen-terraform
        run: terraform init

      - name: Terraform Apply Stage 1 — Network + EKS
        working-directory: lablumen-terraform
        run: |
          terraform apply \
            -target=module.network \
            -target=module.eks \
            --auto-approve
        timeout-minutes: 25

      - name: Terraform Apply Stage 2 — Full
        working-directory: lablumen-terraform
        run: terraform apply --auto-approve
        timeout-minutes: 20

      # ── Phase 2a: Compile and inject DATABASE_URL ─────────────────────────────
      - name: Compile and inject DATABASE_URL
        working-directory: lablumen-terraform
        run: |
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          MASTER_SECRET_ARN=$(terraform output -raw rds_master_user_secret_arn)

          # RDS-managed secret JSON contains username + password + host
          DB_CREDS=$(aws secretsmanager get-secret-value \
            --secret-id "$MASTER_SECRET_ARN" \
            --query SecretString \
            --output text)
          DB_USER=$(echo "$DB_CREDS" | jq -r '.username')
          DB_PASS=$(echo "$DB_CREDS" | jq -r '.password')

          DSN="postgresql://${DB_USER}:${DB_PASS}@${RDS_ENDPOINT}:5432/lablumen"

          aws secretsmanager put-secret-value \
            --secret-id "lablumen/app/database-url" \
            --secret-string "$DSN"
          echo "✅ DATABASE_URL injected into Secrets Manager"

      # ── Phase 2b: Build and push container images ─────────────────────────────
      - name: Authenticate Docker to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login \
              --username AWS \
              --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build and push backend services
        working-directory: lablumen-app
        run: |
          REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          for svc in appointment-service report-service notification-service; do
            echo "--- Building ${svc} ---"
            docker build \
              -t "${REGISTRY}/lablumen/${svc}:latest" \
              "backend/${svc}"
            docker push "${REGISTRY}/lablumen/${svc}:latest"
            echo "✅ Pushed ${svc}"
          done

      - name: Build and push frontend
        working-directory: lablumen-app
        run: |
          REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "--- Building frontend ---"
          docker build \
            -t "${REGISTRY}/lablumen/frontend:latest" \
            frontend
          docker push "${REGISTRY}/lablumen/frontend:latest"
          echo "✅ Pushed frontend"

      # ── Phase 3: Cluster access ───────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      # ── Phase 4: ArgoCD bootstrap + App-of-Apps ───────────────────────────────
      - name: Bootstrap ArgoCD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 7.6.0 \
            --set server.insecure=true \
            --wait \
            --timeout 10m
          echo "✅ ArgoCD bootstrapped"

      - name: Register App-of-Apps root
        working-directory: lablumen-k8s
        run: |
          kubectl apply -f root-app.yaml
          echo "✅ App-of-Apps root registered"

      # ── Phase 5: Verification ─────────────────────────────────────────────────
      - name: Wait — ArgoCD Applications Synced and Healthy
        run: |
          echo "Polling ArgoCD until all Applications reach Synced + Healthy..."
          TIMEOUT=600
          INTERVAL=20
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            PENDING=$(kubectl get applications -n argocd \
              --no-headers \
              -o custom-columns="N:.metadata.name,S:.status.sync.status,H:.status.health.status" \
              | awk '$2 != "Synced" || $3 != "Healthy" { print $1 " [" $2 "/" $3 "]" }')
            if [ -z "$PENDING" ]; then
              echo "✅ All ArgoCD Applications are Synced and Healthy"
              break
            fi
            echo "  Still pending (${ELAPSED}s): ${PENDING}"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "❌ Timeout after ${TIMEOUT}s — ArgoCD sync incomplete"
            kubectl get applications -n argocd -o wide
            exit 1
          fi

      - name: Verify ClusterSecretStores are Ready
        run: |
          kubectl wait clustersecretstore aws-secrets-manager \
            --for=condition=Ready --timeout=120s
          kubectl wait clustersecretstore aws-parameter-store \
            --for=condition=Ready --timeout=120s
          echo "✅ Both ClusterSecretStores Ready"

      - name: Verify ExternalSecrets are Synced
        run: |
          for secret in appointment-service-secrets notification-service-secrets report-service-secrets; do
            kubectl wait externalsecret "$secret" \
              -n lablumen \
              --for=condition=Ready \
              --timeout=180s
            echo "✅ ${secret} synced"
          done

      - name: Wait — lablumen Deployments Available
        run: |
          for deploy in appointment-service report-service notification-service; do
            kubectl wait deployment "$deploy" \
              -n lablumen \
              --for=condition=Available \
              --timeout=300s
            echo "✅ ${deploy} Available"
          done

      - name: Wait for ALB address and verify health endpoints
        run: |
          echo "Polling for ALB hostname..."
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0
          ALB=""
          while [ $ELAPSED -lt $TIMEOUT ]; do
            ALB=$(kubectl get ingress -n lablumen \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -n "$ALB" ] && break
            echo "  No address yet (${ELAPSED}s elapsed)..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ -z "$ALB" ]; then
            echo "❌ ALB address not assigned after ${TIMEOUT}s"
            kubectl describe ingress -n lablumen
            exit 1
          fi
          echo "ALB hostname: ${ALB}"

          echo "Waiting 60s for DNS propagation..."
          sleep 60

          curl --fail --silent --show-error \
            --retry 10 --retry-delay 15 --retry-max-time 180 \
            "http://${ALB}/api/v1/healthz"
          echo "✅ appointment-service /api/v1/healthz → 200"

          curl --fail --silent --show-error \
            --retry 10 --retry-delay 15 --retry-max-time 180 \
            "http://${ALB}/api/v1/reports/healthz"
          echo "✅ report-service /api/v1/reports/healthz → 200"

      # ── Cleanup on failure ────────────────────────────────────────────────────
      - name: Destroy infrastructure on failure
        if: failure() && steps.setup_terraform.outcome == 'success'
        working-directory: lablumen-terraform
        run: |
          echo "Pipeline failed — running terraform destroy to prevent orphaned resources..."
          terraform destroy --auto-approve
        timeout-minutes: 30
